name: Project Orchestrator

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Workflow stage to run"
        required: true
        type: choice
        options:
          - clarify
          - solutions
          - design
          - plan
          - review
          - finalize
      goal_issue:
        description: "Issue number or URL to seed goals (optional)"
        required: false
        default: ""
      fixed_parts_path:
        description: "Path to fixed parts file (optional)"
        required: false
        default: ""
      model:
        description: "GitHub Models model name"
        required: false
        default: "default"
      allow_stub:
        description: "Allow stub artifacts if LLM unavailable"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run orchestrator stage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -m orchestrator \
            --stage "${{ inputs.stage }}" \
            --model "${{ inputs.model }}" \
            ${{ inputs.allow_stub == 'true' && '--allow-stub' || '' }} \
            ${{ inputs.goal_issue != '' && format('--goal-issue "{0}"', inputs.goal_issue) || '' }} \
            ${{ inputs.fixed_parts_path != '' && format('--fixed-parts-path "{0}"', inputs.fixed_parts_path) || '' }}

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project/
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
          else
            git commit -m "chore: update project artifacts for stage '${{ inputs.stage }}' [skip ci]"
            git push
          fi
